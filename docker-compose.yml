services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: autocare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-autocare}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autocare_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
