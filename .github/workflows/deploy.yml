name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  # ghcr.io 이미지 push 권한

    steps:
      # 1. 소스코드 받기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. ghcr.io 로그인
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. backend 이미지 빌드 + push
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ghcr.io/jijohn1/autocare-copilot-backend:latest

      # 4. frontend 이미지 빌드 + push
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/jijohn1/autocare-copilot-frontend:latest

      # 5. VM에 SSH 접속해서 새 이미지로 재시작
      - name: Deploy to GCE VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            cd /home/yoeumii/autocare-copilot
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
